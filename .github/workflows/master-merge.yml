name: Master Merge

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 30

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    environment: integration

    env:
      PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
      PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      NOCODB_API_URL: ${{ secrets.NOCODB_API_URL }}
      NOCODB_API_TOKEN: ${{ secrets.NOCODB_API_TOKEN }}
      NOCODB_BASE_ID: ${{ secrets.NOCODB_BASE_ID }}
      NOCODB_TABLE_BLACK_SWANS: ${{ secrets.NOCODB_TABLE_BLACK_SWANS }}
      NOCODB_TABLE_AI_SUMMARY: ${{ secrets.NOCODB_TABLE_AI_SUMMARY }}
      NOCODB_TABLE_HISTORIC_DATA: ${{ secrets.NOCODB_TABLE_HISTORIC_DATA }}
      NOCODB_TABLE_GPW_SYMBOLS: ${{ secrets.NOCODB_TABLE_GPW_SYMBOLS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E setup
        run: npm run test:e2e:setup

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload E2E test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    environment: production

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy source code to server
        run: |
          sshpass -p '${{ secrets.DEPLOY_SSH_PASSWORD }}' rsync -avz --delete \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT }} -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            --exclude dist \
            --exclude .git \
            --exclude .env \
            --exclude coverage \
            --exclude test-results \
            --exclude playwright-report \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Install dependencies on server
        run: |
          sshpass -p '${{ secrets.DEPLOY_SSH_PASSWORD }}' ssh -p ${{ secrets.DEPLOY_SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && npm ci --production"

      - name: Build application on server
        run: |
          sshpass -p '${{ secrets.DEPLOY_SSH_PASSWORD }}' ssh -p ${{ secrets.DEPLOY_SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && npm run build"

      - name: Restart PM2 application
        run: |
          sshpass -p '${{ secrets.DEPLOY_SSH_PASSWORD }}' ssh -p ${{ secrets.DEPLOY_SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && pm2 delete ${{ secrets.PM2_APP_NAME }} || true && pm2 start ecosystem.config.cjs && pm2 save"

      - name: Verify deployment
        run: |
          sshpass -p '${{ secrets.DEPLOY_SSH_PASSWORD }}' ssh -p ${{ secrets.DEPLOY_SSH_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "pm2 list | grep ${{ secrets.PM2_APP_NAME }}"

  deployment-comment:
    name: Deployment Status Comment
    runs-on: ubuntu-latest
    needs: [build, unit-test, e2e-test, deploy]
    if: always()
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check deployment status
        id: check-status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=🚀" >> $GITHUB_OUTPUT
            echo "message=Application successfully deployed to production!" >> $GITHUB_OUTPUT
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=Deployment failed. Please check the logs." >> $GITHUB_OUTPUT
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "emoji=⚠️" >> $GITHUB_OUTPUT
            echo "message=Deployment was skipped due to test failures." >> $GITHUB_OUTPUT
          fi

      - name: Find associated PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 10
            });

            const pr = pulls.find(p => 
              p.merge_commit_sha === context.sha ||
              p.head.sha === context.sha
            );

            if (pr) {
              core.setOutput('pr_number', pr.number);
              core.setOutput('pr_found', 'true');
            } else {
              core.setOutput('pr_found', 'false');
            }

      - name: Comment on PR
        if: steps.find-pr.outputs.pr_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const statusEmoji = '${{ steps.check-status.outputs.emoji }}';
            const statusMessage = '${{ steps.check-status.outputs.message }}';
            const buildStatus = '${{ needs.build.result }}';
            const unitTestStatus = '${{ needs.unit-test.result }}';
            const e2eTestStatus = '${{ needs.e2e-test.result }}';
            const deployStatus = '${{ needs.deploy.result }}';

            const getStatusEmoji = (status) => {
              if (status === 'success') return '✅';
              if (status === 'failure') return '❌';
              if (status === 'cancelled') return '⚠️';
              if (status === 'skipped') return '⏭️';
              return '⏭️';
            };

            const comment = `## ${statusEmoji} Master Merge - Deployment Status

            ${statusMessage}

            ### Pipeline Results:
            - **Build**: ${getStatusEmoji(buildStatus)} \`${buildStatus}\`
            - **Unit Tests**: ${getStatusEmoji(unitTestStatus)} \`${unitTestStatus}\`
            - **E2E Tests**: ${getStatusEmoji(e2eTestStatus)} \`${e2eTestStatus}\`
            - **Deployment**: ${getStatusEmoji(deployStatus)} \`${deployStatus}\`

            ### Deployment Details:
            - **Commit**: \`${{ github.sha }}\`
            - **Branch**: \`${{ github.ref_name }}\`
            - **Triggered by**: @${{ github.actor }}
            - **Environment**: Production

            ---
            *Workflow run: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*`;

            await github.rest.issues.createComment({
              issue_number: ${{ steps.find-pr.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
